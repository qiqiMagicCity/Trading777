<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>用户注册 · Trading777</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main>
    <div class="neon-box">
      <h2>用户注册</h2>
      <form id="registerForm">
        <input type="email" id="email" placeholder="邮箱" required />
        <input type="password" id="password" placeholder="密码（至少 6 位）" minlength="6" required />
        <button type="submit">注册</button>
        <p id="msg" style="color:#ff6470;margin-top:0.6rem;height:1.4rem;"></p>
      </form>
    </div>
  </main>
  <footer>© 魔都万事屋™ • MagicCity Global Tec • Version 0.753</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js_supabaseClient.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const msg  = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const { data, error } = await supabase.auth.signUp({
        email: form.email.value.trim().toLowerCase(),
        password: form.password.value
      });
      if (error) {
        msg.textContent = error.message;
      } else {
        msg.style.color = '#00ff9c';
        msg.textContent = '注册成功！请检查邮箱完成验证，然后返回登录。';
      }
    });
  </script>
</body>
</html>
