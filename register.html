<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易记录</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #001f1f;
      color: #00ff99;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #003333;
      color: #00ff99;
      box-shadow: 0 2px 5px rgba(0,255,153,0.3);
    }

    .logout-button {
      background-color: #00ff99;
      color: #000;
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .content {
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div id="user-email">正在加载...</div>
    <button class="logout-button" onclick="logout()">退出登录</button>
  </div>

  <div class="content">
    <h1>交易录入功能区</h1>
    <!-- 这里可以添加交易表单 -->
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://zcosfwmtatuheqrytvad.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpjb3Nmd210YXR1aGVxcnl0dmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTc5MjM3NTgsImV4cCI6MjAzMzUwOTc1OH0.dfiQXhCVX_wGlxwbHgCBKCIjYONCEZQ3BImqrzya5Og'
    );

    async function checkLoginStatus() {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const userEmail = session.user.email;
      document.getElementById('user-email').textContent = `欢迎您，${userEmail}`;
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    checkLoginStatus();
  </script>
</body>
</html>
