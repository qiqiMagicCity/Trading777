<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易管理系统</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #001f1f, #000000);
      color: #00ff99;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }
    h1 {
      font-size: 5rem;
      margin-bottom: 0.5rem;
      transform: translateY(-15%);
    }
    p {
      font-size: 1.3rem;
      margin-bottom: 2rem;
    }
    .button-group {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .button {
      background-color: #00ff99;
      color: #000;
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>交易通往财富之路。</h1>
  <p>精细化交易管理，科学，理性，务实。</p>
  <div class="button-group">
    <a class="button" href="/login">登录</a>
    <a class="button" href="/register">注册</a>
  </div>
  <div class="footer">本站功能逐步完善中，敬请期待。对本站感兴趣的可以联系站长共同创建</div>
</body>
</html>
