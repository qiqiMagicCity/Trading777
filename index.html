<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易系统</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      font-family: 'Segoe UI', sans-serif;
      color: #00ff99;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: radial-gradient(circle at center, #002b36, #000);
      overflow: hidden;
    }
    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }
    h1 {
      font-size: 3em;
      letter-spacing: 2px;
      margin-bottom: 0.5em;
      text-shadow: 0 0 10px #00ff99;
    }
    p {
      font-size: 1.2em;
      color: #ccc;
    }
    a.button {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background-color: #00ff99;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      box-shadow: 0 0 10px #00ff99;
    }
    footer {
      position: absolute;
      bottom: 20px;
      text-align: center;
      font-size: 0.9em;
      color: #888;
    }
    footer .logo {
      font-weight: bold;
      color: #00ff99;
    }
    footer small {
      display: block;
      margin-top: 5px;
      font-size: 0.75em;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>欢迎来到交易管理系统</h1>
    <p>本站正在建设中，敬请期待。</p>
    <a href="record.html" class="button">进入交易系统</a>
  </div>
  <footer>
    <div class="logo">© 魔都万事屋™</div>
    <small>2005 – 2025 版权所有 • 保留所有权利 • MagicCity Global Tech</small>
  </footer>
</body>
</html>
