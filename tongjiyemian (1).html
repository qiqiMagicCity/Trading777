
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账户总览</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #002b36, #000);
      color: #00ff99;
    }
    .header {
      padding: 20px;
      text-align: center;
      font-size: 1.8em;
      font-weight: bold;
    }
    .section {
      margin: 20px;
      background: #000;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ff99;
      padding: 20px;
    }
    h3 {
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #00ff99;
      padding: 8px;
      text-align: center;
    }
    canvas {
      background: #000;
      border-radius: 10px;
      margin-top: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header" id="headerTitle">📊 我的账户总览</div>

  <div id="notLogin" class="section hidden">⚠️ 用户未登录，无法加载数据。</div>

  <div id="dashboardContent">
    <div class="section">
      <h3>账户汇总</h3>
      <div id="accountSummary">加载中...</div>
    </div>

    <div class="section">
      <h3>当前持仓</h3>
      <table id="positionsTable">
        <thead>
          <tr><th>标的</th><th>名称</th><th>持仓</th><th>均价</th><th>当前价</th><th>浮动盈亏</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h3>今日交易记录明细</h3>
      <table id="todayTable">
        <thead>
          <tr><th>标的</th><th>方向</th><th>单价</th><th>数量</th><th>金额</th><th>时间</th><th>备注</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section">
      <h3>盈亏结构分析图</h3>
      <canvas id="pieChart" width="400" height="300"></canvas>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://zcosfwmtatuheqrytvad.supabase.co',
      'YOUR_PUBLIC_ANON_KEY'
    );

    const currentPriceMap = {
      AAPL: 190,
      NVDA: 130,
      TSLA: 180,
      MSFT: 430,
      AMZN: 130
    };

    async function loadDashboard() {
      const { data: userData, error: userError } = await supabase.auth.getUser();
      const user = userData?.user;

      if (!user) {
        document.getElementById('notLogin').classList.remove('hidden');
        document.getElementById('dashboardContent').classList.add('hidden');
        return;
      }

      document.getElementById("headerTitle").innerText = `📊 ${user.email.split("@")[0]} 的账户统计`;

      const today = new Date().toISOString().slice(0, 10);
      const { data: records, error } = await supabase.from('records').select('*').eq('user_id', user.id);

      if (error || !records) {
        document.getElementById('accountSummary').innerHTML = '❌ 数据获取失败';
        return;
      }

      const todayRecords = records.filter(r => r.trade_date === today);
      const holdings = {};
      let totalAmount = 0;

      for (const r of records) {
        if (!holdings[r.symbol]) {
          holdings[r.symbol] = { symbol: r.symbol, name: r.name, qty: 0, cost: 0 };
        }
        if (r.side === 'BOUGHT') {
          holdings[r.symbol].qty += r.quantity;
          holdings[r.symbol].cost += r.quantity * r.price;
        } else if (r.side === 'SOLD') {
          holdings[r.symbol].qty -= r.quantity;
          holdings[r.symbol].cost -= r.quantity * holdings[r.symbol].cost / holdings[r.symbol].qty;
        }
        totalAmount += r.amount;
      }

      const posTable = document.querySelector('#positionsTable tbody');
      const pieLabels = [], pieValues = [];

      for (const sym in holdings) {
        const h = holdings[sym];
        if (h.qty <= 0) continue;
        const avg = h.cost / h.qty;
        const now = currentPriceMap[sym] || avg;
        const profit = ((now - avg) * h.qty).toFixed(2);
        pieLabels.push(sym);
        pieValues.push(Number(profit));

        const row = `<tr>
          <td>${sym}</td><td>${h.name}</td><td>${h.qty}</td>
          <td>${avg.toFixed(2)}</td><td>${now}</td><td>${profit}</td>
        </tr>`;
        posTable.insertAdjacentHTML('beforeend', row);
      }

      const summary = `
        总成交金额：$${totalAmount.toFixed(2)}<br/>
        当日交易次数：${todayRecords.length} 次<br/>
        历史总交易次数：${records.length} 次<br/>
        当前持仓股票数量：${Object.values(holdings).filter(h => h.qty > 0).length} 个
      `;
      document.getElementById('accountSummary').innerHTML = summary;

      const todayTable = document.querySelector('#todayTable tbody');
      for (const r of todayRecords) {
        todayTable.insertAdjacentHTML('beforeend', `
          <tr><td>${r.symbol}</td><td>${r.side}</td><td>${r.price}</td>
          <td>${r.quantity}</td><td>${r.amount}</td><td>${r.trade_date}</td><td>${r.note}</td></tr>
        `);
      }

      const ctx = document.getElementById('pieChart').getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: pieLabels,
          datasets: [{
            data: pieValues,
            backgroundColor: pieValues.map(v => v >= 0 ? '#00ff99' : '#ff3366')
          }]
        },
        options: {
          plugins: { legend: { labels: { color: '#00ff99' } } }
        }
      });
    }

    loadDashboard();
  </script>
</body>
</html>
