<!-- record.html 表单区域：用于录入交易信息 -->
<div class="content">
  <h2>添加交易记录</h2>
  <form id="trade-form" onsubmit="return handleSubmit(event)">
    <div style="margin-bottom:10px">
      <label>标的代码：</label>
      <input type="text" id="symbol" placeholder="如 AAPL" required oninput="updateName()" />
    </div>
    <div style="margin-bottom:10px">
      <label>标的名称：</label>
      <input type="text" id="symbol-name" disabled />
    </div>
    <div style="margin-bottom:10px">
      <label>买卖方向：</label>
      <select id="side" required>
        <option value="BOUGHT">买入</option>
        <option value="SOLD">卖出</option>
        <option value="SHORT">做空</option>
        <option value="COVER">回补</option>
      </select>
    </div>
    <div style="margin-bottom:10px">
      <label>单价：</label>
      <input type="number" id="price" step="0.01" required oninput="updateTotal()" />
    </div>
    <div style="margin-bottom:10px">
      <label>数量：</label>
      <input type="number" id="quantity" required oninput="updateTotal()" />
    </div>
    <div style="margin-bottom:10px">
      <label>订单金额：</label>
      <input type="text" id="total" disabled />
    </div>
    <div style="margin-bottom:10px">
      <label>成交日期：</label>
      <input type="date" id="date" required />
    </div>
    <div style="margin-bottom:10px">
      <label>备注：</label>
      <input type="text" id="note" />
    </div>
    <button type="submit">提交交易记录</button>
  </form>
</div>

<script>
  const symbolMap = {
    AAPL: "苹果公司",
    NVDA: "英伟达",
    TSLA: "特斯拉",
    MSFT: "微软",
    AMZN: "亚马逊",
    META: "Meta"
    // 可扩展更多
  };

  function updateName() {
    const code = document.getElementById('symbol').value.toUpperCase();
    document.getElementById('symbol-name').value = symbolMap[code] || '';
  }

  function updateTotal() {
    const price = parseFloat(document.getElementById('price').value);
    const qty = parseFloat(document.getElementById('quantity').value);
    if (!isNaN(price) && !isNaN(qty)) {
      document.getElementById('total').value = (price * qty).toFixed(2);
    } else {
      document.getElementById('total').value = '';
    }
  }

  function handleSubmit(event) {
    event.preventDefault();
    // 下一步接入 Supabase 写入逻辑
    alert('✅ 表单验证通过，可写入数据库');
    return false;
  }

  // 默认日期为今天
  document.getElementById('date').valueAsDate = new Date();
</script>
