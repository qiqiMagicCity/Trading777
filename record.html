<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易录入</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #002b36, #000);
      color: #00ff99;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .form-box {
      background: #000;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ff99;
      width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #00ff99;
      border: 1px solid #00ff99;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ffcc;
    }

    .message {
      margin-top: 20px;
      font-size: 0.95em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>添加交易记录</h2>

    <label>标的代码:</label>
    <input type="text" id="code" placeholder="如 AAPL" oninput="autoFillName()"/>

    <label>标的名称:</label>
    <input type="text" id="name" disabled />

    <label>买卖方向:</label>
    <select id="side">
      <option value="BOUGHT">买入</option>
      <option value="SOLD">卖出</option>
      <option value="SHORT">做空</option>
      <option value="COVER">回补</option>
    </select>

    <label>单价:</label>
    <input type="number" id="price" step="0.01" oninput="calcTotal()"/>

    <label>数量:</label>
    <input type="number" id="qty" oninput="calcTotal()"/>

    <label>订单金额:</label>
    <input type="text" id="amount" disabled />

    <label>成交日期:</label>
    <input type="date" id="date" />

    <label>备注:</label>
    <input type="text" id="note" />

    <button onclick="submitForm()">提交交易记录</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    const nameMap = {
      AAPL: '苹果公司',
      NVDA: '英伟达',
      TSLA: '特斯拉',
      MSFT: '微软',
      AMZN: '亚马逊'
    };

    document.getElementById('date').valueAsDate = new Date();

    function autoFillName() {
      const code = document.getElementById('code').value.trim().toUpperCase();
      document.getElementById('name').value = nameMap[code] || '';
    }

    function calcTotal() {
      const price = parseFloat(document.getElementById('price').value);
      const qty = parseFloat(document.getElementById('qty').value);
      const total = (!isNaN(price) && !isNaN(qty)) ? (price * qty).toFixed(2) : '';
      document.getElementById('amount').value = total;
    }

    function submitForm() {
      // 下一步处理写入 Supabase
      const msg = document.getElementById('message');
      msg.innerText = '✅ 表单已填写完毕，准备写入数据库（下一步）';
    }
  </script>
</body>
</html>
