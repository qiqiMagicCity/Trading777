<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交易录入</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #002b36, #000);
      color: #00ff99;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }
    .form-box {
      background: #000;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ff99;
      width: 400px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #00ff99;
      border: 1px solid #00ff99;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #00ffcc;
    }
    .message {
      margin-top: 20px;
      font-size: 0.95em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>添加交易记录</h2>

    <label>标的代码:</label>
    <input type="text" id="code" placeholder="如 AAPL" oninput="autoFillName()" />

    <label>标的名称:</label>
    <input type="text" id="name" disabled />

    <label>买卖方向:</label>
    <select id="side">
      <option value="BOUGHT">买入</option>
      <option value="SOLD">卖出</option>
      <option value="SHORT">做空</option>
      <option value="COVER">回补</option>
    </select>

    <label>单价:</label>
    <input type="number" id="price" step="0.01" oninput="calcTotal()" />

    <label>数量:</label>
    <input type="number" id="qty" oninput="calcTotal()" />

    <label>订单金额:</label>
    <input type="text" id="amount" disabled />

    <label>成交日期:</label>
    <input type="date" id="date" />

    <label>备注:</label>
    <input type="text" id="note" />

    <button onclick="submitForm()">提交交易记录</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://zcosfwmtatuheqrytvad.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpjb3Nmd210YXR1aGVxcnl0dmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk0MTE0ODUsImV4cCI6MjA2NDk4NzQ4NX0.y5T5cf8BNsbbM5Va0kjHX1i359J1aAB4RYO6p16TKqk'
    );

    const nameMap = {
      AAPL: '苹果公司',
      NVDA: '英伟达',
      TSLA: '特斯拉',
      MSFT: '微软',
      AMZN: '亚马逊'
    };

    document.getElementById('date').valueAsDate = new Date();

    function autoFillName() {
      const code = document.getElementById('code').value.trim().toUpperCase();
      document.getElementById('name').value = nameMap[code] || '';
    }

    function calcTotal() {
      const price = parseFloat(document.getElementById('price').value);
      const qty = parseFloat(document.getElementById('qty').value);
      const total = (!isNaN(price) && !isNaN(qty)) ? (price * qty).toFixed(2) : '';
      document.getElementById('amount').value = total;
    }

    async function submitForm() {
      const msg = document.getElementById('message');
      msg.textContent = '⏳ 提交中...';

      const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
      const user = sessionData?.session?.user;

      if (!user) {
        msg.textContent = '❌ 用户未登录';
        return;
      }

      const symbol = document.getElementById('code').value.trim().toUpperCase();
      const name = document.getElementById('name').value.trim();
      const side = document.getElementById('side').value;
      const price = parseFloat(document.getElementById('price').value);
      const quantity = parseInt(document.getElementById('qty').value);
      const amount = parseFloat(document.getElementById('amount').value);
      const trade_date = document.getElementById('date').value;
      const note = document.getElementById('note').value.trim();

      const { error } = await supabase.from('records').insert([{
        user_id: user.id,
        symbol,
        name,
        side,
        price,
        quantity,
        amount,
        trade_date,
        note
      }]);

      if (error) {
        console.error('❌ 写入失败', error);
        msg.textContent = '❌ 写入失败: ' + error.message;
      } else {
        msg.textContent = '✅ 写入成功，正在跳转...';
        setTimeout(() => {
          window.location.href = 'dangrijiaoyimingxi.html';
        }, 1000);
      }
    }
  </script>
</body>
</html>
