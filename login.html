<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #002b36, #000);
      color: #00ff99;
    }
    .login-box {
      text-align: center;
      background: #000;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ff99;
    }
    h2 {
      margin-bottom: 20px;
    }
    input[type=email],
    input[type=password] {
      width: 260px;
      padding: 10px;
      margin: 10px 0;
      background: #000;
      color: #00ff99;
      border: 1px solid #00ff99;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px #00ff99;
    }
    button:hover {
      background: #00ffcc;
    }
    .message {
      margin-top: 20px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>用户登录</h2>
    <input type="email" id="email" placeholder="请输入邮箱" />
    <br>
    <input type="password" id="password" placeholder="请输入密码" />
    <br>
    <button onclick="login()">登录</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://zcosfwmtatuheqrytvad.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpjb3Nmd210YXR1aGVxcnl0dmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk0MTE0ODUsImV4cCI6MjA2NDk4NzQ4NX0.y5T5cf8BNsbbM5Va0kjHX1i359J1aAB4RYO6p16TKqk'
    );

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('message');

      if (!email || !password) {
        msg.textContent = '❌ 邮箱和密码不能为空';
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      console.log('🔐 登录响应:', { data, error });

      if (error) {
        msg.textContent = `❌ 登录失败：${error.message}`;
      } else {
        msg.textContent = '✅ 登录成功，正在跳转...';
        setTimeout(() => {
          window.location.href = 'record.html';
        }, 800);
      }
    }
  </script>
</body>
</html>
